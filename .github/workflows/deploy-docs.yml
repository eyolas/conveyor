name: Deploy Docs

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    name: Build & Deploy to Cloudflare Pages
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        working-directory: docs
        run: npm ci

      - name: Resolve version
        id: version
        working-directory: docs
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            FULL="${GITHUB_REF#refs/tags/}"
          else
            FULL="v$(node -e "const c = JSON.parse(require('fs').readFileSync('../packages/core/deno.json','utf8')); console.log(c.version)")"
          fi
          MAJOR="v$(echo "$FULL" | sed 's/^v//' | cut -d. -f1)"
          echo "full=$FULL" >> "$GITHUB_OUTPUT"
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $FULL (major: $MAJOR)"

      - name: Update versions.json
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: docs
        run: |
          MAJOR="${{ steps.version.outputs.major }}"
          FULL="${{ steps.version.outputs.full }}"
          node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('versions.json', 'utf8'));
            data.current = '$MAJOR';
            data.fullVersion = '$FULL';
            fs.writeFileSync('versions.json', JSON.stringify(data, null, 2) + '\n');
          "
          echo "Updated versions.json with current=$MAJOR, fullVersion=$FULL"

      - name: Build VitePress
        working-directory: docs
        run: npm run build

      - name: Commit versions.json if changed
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/versions.json
          git diff --staged --quiet && exit 0
          git commit -m "docs: update version to ${{ steps.version.outputs.major }}"
          git push origin HEAD:main

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3.14.1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy docs/.vitepress/dist --project-name=conveyor-docs

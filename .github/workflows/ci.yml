name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-check:
    name: Lint, Format & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: denoland/setup-deno@v2
        with:
          deno-version: '2.x'

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/deno
            node_modules
          key: deno-${{ runner.os }}-${{ hashFiles('deno.lock') }}
          restore-keys: deno-${{ runner.os }}-

      - name: Verify formatting
        run: deno fmt --check

      - name: Lint
        run: deno lint

      - name: Type check
        run: deno check packages/*/src/mod.ts

  test-deno:
    name: Tests (Deno)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: conveyor
          POSTGRES_PASSWORD: conveyor
          POSTGRES_DB: conveyor_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PG_URL: postgres://conveyor:conveyor@localhost:5432/conveyor_test

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: denoland/setup-deno@v2
        with:
          deno-version: '2.x'

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/deno
            node_modules
          key: deno-${{ runner.os }}-${{ hashFiles('deno.lock') }}
          restore-keys: deno-${{ runner.os }}-

      - name: Run tests (core + memory + pg)
        run: deno -A npm:vitest run

      - name: Run SQLite tests (Deno)
        run: deno -A npm:vitest run --config vitest.sqlite.config.ts tests/store-sqlite-deno/

  test-node:
    name: Tests (Node.js ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['22', '24']

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: conveyor
          POSTGRES_PASSWORD: conveyor
          POSTGRES_DB: conveyor_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PG_URL: postgres://conveyor:conveyor@localhost:5432/conveyor_test

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - uses: actions/cache@v4
        with:
          path: node_modules
          key: npm-${{ runner.os }}-node${{ matrix.node-version }}-${{ hashFiles('package.json') }}
          restore-keys: npm-${{ runner.os }}-node${{ matrix.node-version }}-

      - name: Install dependencies
        run: npm install

      - name: Run tests (core + memory + pg)
        run: npx vitest run

      - name: Run SQLite tests (Node.js)
        run: npx vitest run --config vitest.sqlite.config.ts tests/store-sqlite/

  test-bun:
    name: Tests (Bun)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: conveyor
          POSTGRES_PASSWORD: conveyor
          POSTGRES_DB: conveyor_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PG_URL: postgres://conveyor:conveyor@localhost:5432/conveyor_test

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: oven-sh/setup-bun@v2

      - uses: actions/cache@v4
        with:
          path: node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('package.json') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install

      - name: Run tests (core + memory + pg)
        run: bunx vitest run

      - name: Run SQLite tests (Bun)
        run: bun test --timeout 30000 tests/store-sqlite-bun/

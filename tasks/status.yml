# Conveyor — Project Status
# This file is the single source of truth for task and roadmap status.
#
# Roadmap & task lifecycle:
#   todo → planned → in-progress → done
#
#   todo          No task file yet, just an idea in the roadmap
#   planned       Task file created with detailed plan, ready for dev
#   in-progress   Actively being worked on
#   done          Completed and verified
#
# Thinking lifecycle (ideas not yet in roadmap):
#   thinking → accepted | abandoned
#
#   thinking      Idea under consideration, needs discussion/analysis
#   accepted      Idea validated → moved to roadmap as todo
#   abandoned     Idea rejected with reason

# ─── Thinking (ideas under consideration) ─────────────────────────────────────


services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: conveyor
      POSTGRES_PASSWORD: conveyor
      POSTGRES_DB: conveyor_test
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', 'conveyor']
      interval: 5s
      timeout: 3s
      retries: 5
